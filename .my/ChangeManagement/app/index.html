<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Adoption Scorecard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f7f7f8;color:#1a1a2e;line-height:1.6;min-height:100vh;display:flex;justify-content:center;padding:16px}
.app{max-width:640px;width:100%;margin:0 auto}
.screen{display:none;opacity:0;transition:opacity .2s ease}
.screen.active{display:block;opacity:1}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:24px;margin-bottom:16px}
@media(max-width:480px){.card{padding:16px}}
h1{font-size:1.75rem;font-weight:700;margin-bottom:4px}
h2{font-size:1.25rem;font-weight:600;margin-bottom:8px}
h3{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.subtitle{color:#6b7280;font-size:1rem;margin-bottom:16px}
.intro{color:#1a1a2e;font-size:.95rem;margin-bottom:24px;line-height:1.7}
.toggle-group{display:flex;gap:0;border-radius:8px;overflow:hidden;border:2px solid #e2e4e9;margin-bottom:16px}
.toggle-btn{flex:1;padding:10px 16px;border:none;background:#fff;color:#1a1a2e;font-size:.95rem;font-weight:500;cursor:pointer;transition:background .15s,color .15s;text-align:center}
.toggle-btn.active{background:#2563eb;color:#fff}
.toggle-btn:hover:not(.active){background:#f0f4ff}
.toggle-label{font-size:.85rem;color:#6b7280;margin-bottom:6px;font-weight:500}
.btn-primary{display:block;width:100%;padding:14px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#1d4ed8}
.btn-primary:disabled{background:#a5b4cf;cursor:not-allowed}
.btn-secondary{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border:2px solid #e2e4e9;border-radius:8px;background:#fff;color:#1a1a2e;font-size:.9rem;font-weight:500;cursor:pointer;transition:border-color .15s}
.btn-secondary:hover{border-color:#2563eb;color:#2563eb}
.progress-wrap{margin-bottom:16px}
.progress-bar-bg{width:100%;height:4px;background:#e2e4e9;border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:#2563eb;border-radius:2px;transition:width .3s ease}
.progress-text{font-size:.85rem;color:#6b7280;margin-top:6px}
.options{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.option-card{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;border:2px solid #e2e4e9;border-radius:8px;background:#fff;cursor:pointer;transition:border-color .15s,background .15s;text-align:left;font-size:.95rem;color:#1a1a2e;line-height:1.5}
.option-card:hover{border-color:#2563eb;background:#f0f4ff}
.option-card.selected{border-color:#2563eb;background:#eff4ff}
.option-card input[type="radio"]{display:none}
.option-num{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:2px solid #e2e4e9;font-weight:600;font-size:.85rem;flex-shrink:0;transition:border-color .15s,background .15s,color .15s}
.option-card.selected .option-num{border-color:#2563eb;background:#2563eb;color:#fff}
.option-label{flex:1}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.statement-text{font-size:1.05rem;font-weight:500;line-height:1.6}
fieldset{border:none;padding:0;margin:0}
legend{font-size:1.05rem;font-weight:500;line-height:1.6;margin-bottom:4px;width:100%}
.bonus-block{margin-bottom:24px}
.bonus-block:last-of-type{margin-bottom:16px}
.bonus-letter{font-size:.8rem;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:600}
.result-phase{border-left:4px solid #2563eb;padding-left:16px;margin-bottom:8px}
.result-phase .phase-name{font-size:1.1rem;font-weight:700;color:#2563eb}
.result-phase .tagline{font-style:italic;color:#6b7280;margin-bottom:8px}
.result-phase .desc{margin-bottom:8px;font-size:.95rem;line-height:1.6}
.result-phase .help{background:#f0f4ff;padding:12px;border-radius:6px;font-size:.9rem;line-height:1.5}
.help strong{font-weight:600}
.chart{margin-top:16px}
.chart-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
.chart-label{width:170px;flex-shrink:0;font-size:.85rem;font-weight:500;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:480px){.chart-label{width:120px;font-size:.8rem}}
.chart-bar-wrap{flex:1;height:24px;background:#e2e4e9;border-radius:4px;overflow:hidden;position:relative}
.chart-bar{height:100%;border-radius:4px;transition:width .5s ease;background:#93c5fd}
.chart-bar.dominant{background:#2563eb}
.chart-score{width:36px;font-size:.85rem;color:#6b7280;flex-shrink:0;text-align:left}
.star{color:#2563eb;margin-left:2px}
.bonus-result{padding:16px;background:#fef9ef;border-radius:8px;border:1px solid #f0e4c8;font-size:.95rem;line-height:1.6}
.interp-notes{font-size:.9rem;color:#6b7280;line-height:1.6;margin-top:8px}
.transition-note{background:#fff7ed;padding:12px;border-radius:6px;font-size:.9rem;line-height:1.5;margin-bottom:16px;border:1px solid #fed7aa}
.spread-section{margin-top:24px}
.spread-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.spread-phase-label{width:140px;flex-shrink:0;font-size:.85rem;font-weight:500;text-align:right}
@media(max-width:480px){.spread-phase-label{width:100%;text-align:left;margin-bottom:4px}}
.spread-options{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.spread-opt{padding:6px 12px;border:2px solid #e2e4e9;border-radius:6px;font-size:.8rem;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;white-space:nowrap}
.spread-opt:hover{border-color:#2563eb;background:#f0f4ff}
.spread-opt.selected{border-color:#2563eb;background:#eff4ff}
.section-title{font-size:1rem;font-weight:600;margin-bottom:12px;margin-top:24px;color:#1a1a2e}
.section-title:first-child{margin-top:0}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- START SCREEN -->
  <div class="screen active" id="screen-start">
    <div class="card">
      <div class="toggle-label" id="mode-label">Mode</div>
      <div class="toggle-group" role="radiogroup" aria-labelledby="mode-label">
        <button class="toggle-btn active" data-mode="individual" id="btn-mode-individual" role="radio" aria-checked="true">Personal</button>
        <button class="toggle-btn" data-mode="team" id="btn-mode-team" role="radio" aria-checked="false">Team</button>
      </div>
      <div class="toggle-label">Language</div>
      <div class="toggle-group" role="radiogroup" aria-label="Language">
        <button class="toggle-btn active" data-lang="en" role="radio" aria-checked="true">EN</button>
        <button class="toggle-btn" data-lang="nl" role="radio" aria-checked="false">NL</button>
      </div>
      <h1 id="start-title"></h1>
      <div class="subtitle" id="start-subtitle"></div>
      <p class="intro" id="start-intro"></p>
      <button class="btn-primary" id="btn-start"></button>
    </div>
  </div>

  <!-- QUESTION SCREEN -->
  <div class="screen" id="screen-question">
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="21" style="width:0%"></div></div>
        <div class="progress-text" id="progress-text"></div>
      </div>
      <fieldset id="question-fieldset">
        <legend class="statement-text" id="statement-text"></legend>
        <div class="options" id="question-options"></div>
      </fieldset>
      <div class="nav-row">
        <button class="btn-secondary" id="btn-back" style="visibility:hidden">&larr; <span id="btn-back-label">Back</span></button>
        <div></div>
      </div>
    </div>
  </div>

  <!-- BONUS SCREEN -->
  <div class="screen" id="screen-bonus">
    <div class="card">
      <h2 id="bonus-title"></h2>
      <p class="subtitle" id="bonus-subtitle"></p>
      <div class="bonus-block" id="bonus-a-block">
        <div class="bonus-letter">A</div>
        <fieldset>
          <legend id="bonus-a-text"></legend>
          <div class="options" id="bonus-a-options"></div>
        </fieldset>
      </div>
      <div class="bonus-block" id="bonus-b-block">
        <div class="bonus-letter">B</div>
        <fieldset>
          <legend id="bonus-b-text"></legend>
          <div class="options" id="bonus-b-options"></div>
        </fieldset>
      </div>
      <div class="nav-row">
        <button class="btn-secondary" id="btn-back-bonus">&larr; <span id="btn-back-bonus-label">Back</span></button>
        <button class="btn-primary" id="btn-see-results" disabled style="flex:0 0 auto;width:auto;padding:12px 24px"></button>
      </div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="screen" id="screen-results">
    <div class="card" id="results-card"></div>
  </div>

</div>

<script>
(function(){
"use strict";

/* ===== DATA ===== */
const DATA = {

bonus: {

const LABELS = {
en: {
startButton:"Start",nextButton:"Next",backButton:"Back",seeResults:"See results",startOver:"Start over",
statementOf:"Statement {current} of {total}",bonusTitle:"Two more statements",
bonusSubtitle:"These help distinguish whether your relationship with AI is more emotional or practical.",
resultsTitle:"Your result",dominantPhase:"Your dominant phase",allScores:"All phase scores",
bonusResult:"Emotional or practical?",interpretationTitle:"How to read this",
modeIndividual:"Personal",modeTeam:"Team",
spreadTitle:"How widespread is this in your team?",
teamSpreadIntro:"For each phase, indicate how broadly you observe this behaviour."
},
nl: {
startButton:"Start",nextButton:"Volgende",backButton:"Terug",seeResults:"Bekijk resultaat",startOver:"Opnieuw beginnen",
statementOf:"Stelling {current} van {total}",bonusTitle:"Nog twee stellingen",
bonusSubtitle:"Deze helpen onderscheiden of je relatie met AI vooral emotioneel of praktisch is.",
resultsTitle:"Je resultaat",dominantPhase:"Je dominante fase",allScores:"Alle fasescores",
bonusResult:"Emotioneel of praktisch?",interpretationTitle:"Hoe lees je dit?",
modeIndividual:"Persoonlijk",modeTeam:"Team",
spreadTitle:"Hoe breed zie je dit in je team?",
teamSpreadIntro:"Geef per fase aan hoe breed je dit gedrag observeert."
}
};

const BLOCKS = ["A","B","C","D","E","F","G"];

/* ===== STATE ===== */
let state = {
lang: "en",
mode: "individual",
currentQ: 0,
answers: new Array(21).fill(-1),
shuffled: [],
bonusA: -1,
bonusB: -1,
spread: {}
};

/* ===== HELPERS ===== */
function $(id){ return document.getElementById(id); }
function d(){ return DATA[state.lang][state.mode]; }
function l(){ return LABELS[state.lang]; }

function fisherYates(arr){
  const a = arr.map(function(item,i){ return {item:item,origIndex:i}; });
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    const t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){
    s.classList.remove('active');
  });
  var el = $(id);
  el.classList.add('active');
  setTimeout(function(){
    var first = el.querySelector('button:not([style*="hidden"]),input,[tabindex="0"]');
    if(first) first.focus();
  },50);
}

/* ===== START SCREEN ===== */
function updateStartScreen(){
  var dd = d(), ll = l();
  document.documentElement.lang = state.lang;
  $('start-title').textContent = dd.title;
  $('start-subtitle').textContent = dd.subtitle;
  $('start-intro').textContent = dd.intro;
  $('btn-start').textContent = ll.startButton;
  $('btn-mode-individual').textContent = ll.modeIndividual;
  $('btn-mode-team').textContent = ll.modeTeam;
}

// Mode toggles
document.querySelectorAll('[data-mode]').forEach(function(btn){
  btn.addEventListener('click', function(){
    state.mode = this.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(function(b){
      b.classList.remove('active');
      b.setAttribute('aria-checked','false');
    });
    this.classList.add('active');
    this.setAttribute('aria-checked','true');
    updateStartScreen();
  });
});

// Lang toggles
document.querySelectorAll('[data-lang]').forEach(function(btn){
  btn.addEventListener('click', function(){
    state.lang = this.dataset.lang;
    document.querySelectorAll('[data-lang]').forEach(function(b){
      b.classList.remove('active');
      b.setAttribute('aria-checked','false');
    });
    this.classList.add('active');
    this.setAttribute('aria-checked','true');
    updateStartScreen();
  });
});

// Start button
$('btn-start').addEventListener('click', function(){
  var stmts = d().statements;
  state.shuffled = fisherYates(stmts);
  state.answers = new Array(21).fill(-1);
  state.currentQ = 0;
  state.bonusA = -1;
  state.bonusB = -1;
  state.spread = {};
  showQuestion();
  showScreen('screen-question');
});

/* ===== QUESTION SCREEN ===== */
function showQuestion(){
  var dd = d(), ll = l();
  var q = state.currentQ;
  var total = 21;
  var pct = ((q+1)/total)*100;
  var fill = $('progress-fill');
  fill.style.width = pct+'%';
  fill.setAttribute('aria-valuenow', q+1);
  fill.setAttribute('aria-valuemax', total);
  $('progress-text').textContent = ll.statementOf.replace('{current}',q+1).replace('{total}',total);

  var s = state.shuffled[q];
  $('statement-text').textContent = s.item.text;

  var optWrap = $('question-options');
  optWrap.innerHTML = '';
  for(var i=0;i<3;i++){
    var card = document.createElement('label');
    card.className = 'option-card' + (state.answers[q]===i?' selected':'');
    card.setAttribute('tabindex','0');
    var radio = document.createElement('input');
    radio.type='radio';radio.name='q'+q;radio.value=i;
    if(state.answers[q]===i) radio.checked=true;
    var num = document.createElement('span');
    num.className='option-num';num.textContent=i;
    var lbl = document.createElement('span');
    lbl.className='option-label';lbl.textContent=dd.scoreLabels[i];
    card.appendChild(radio);
    card.appendChild(num);
    card.appendChild(lbl);
    (function(val,cardEl){
      cardEl.addEventListener('click', function(e){
        e.preventDefault();
        selectAnswer(val);
      });
      cardEl.addEventListener('keydown', function(e){
        if(e.key==='Enter'||e.key===' '){e.preventDefault();selectAnswer(val);}
      });
    })(i,card);
    optWrap.appendChild(card);
  }

  $('btn-back').style.visibility = q===0?'hidden':'visible';
  $('btn-back-label').textContent = ll.backButton;
}

function selectAnswer(val){
  state.answers[state.currentQ] = val;
  var cards = $('question-options').querySelectorAll('.option-card');
  cards.forEach(function(c,i){
    c.classList.toggle('selected', i===val);
  });
  setTimeout(function(){
    if(state.currentQ < 20){
      state.currentQ++;
      showQuestion();
    } else {
      showBonusScreen();
      showScreen('screen-bonus');
    }
  },300);
}

$('btn-back').addEventListener('click', function(){
  if(state.currentQ>0){
    state.currentQ--;
    showQuestion();
  }
});

/* ===== BONUS SCREEN ===== */
function showBonusScreen(){
  var dd = d(), ll = l();
  $('bonus-title').textContent = ll.bonusTitle;
  $('bonus-subtitle').textContent = ll.bonusSubtitle;
  $('bonus-a-text').textContent = dd.bonus.a;
  $('bonus-b-text').textContent = dd.bonus.b;
  $('btn-see-results').textContent = ll.seeResults;
  $('btn-back-bonus-label').textContent = ll.backButton;

  renderBonusOptions('bonus-a-options','a');
  renderBonusOptions('bonus-b-options','b');
  updateSeeResults();
}

function renderBonusOptions(containerId, which){
  var dd = d();
  var wrap = $(containerId);
  wrap.innerHTML = '';
  var current = which==='a'?state.bonusA:state.bonusB;
  for(var i=0;i<3;i++){
    var card = document.createElement('label');
    card.className = 'option-card' + (current===i?' selected':'');
    card.setAttribute('tabindex','0');
    var radio = document.createElement('input');
    radio.type='radio';radio.name='bonus_'+which;radio.value=i;
    if(current===i) radio.checked=true;
    var num = document.createElement('span');
    num.className='option-num';num.textContent=i;
    var lbl = document.createElement('span');
    lbl.className='option-label';lbl.textContent=dd.scoreLabels[i];
    card.appendChild(radio);
    card.appendChild(num);
    card.appendChild(lbl);
    (function(val,w){
      card.addEventListener('click', function(e){
        e.preventDefault();
        if(w==='a') state.bonusA=val; else state.bonusB=val;
        renderBonusOptions(containerId,w);
        updateSeeResults();
      });
      card.addEventListener('keydown', function(e){
        if(e.key==='Enter'||e.key===' '){
          e.preventDefault();
          if(w==='a') state.bonusA=val; else state.bonusB=val;
          renderBonusOptions(containerId,w);
          updateSeeResults();
        }
      });
    })(i,which);
    wrap.appendChild(card);
  }
}

function updateSeeResults(){
  $('btn-see-results').disabled = (state.bonusA<0 || state.bonusB<0);
}

$('btn-back-bonus').addEventListener('click', function(){
  state.currentQ = 20;
  showQuestion();
  showScreen('screen-question');
});

$('btn-see-results').addEventListener('click', function(){
  if(state.bonusA>=0 && state.bonusB>=0){
    showResults();
    showScreen('screen-results');
  }
});

/* ===== RESULTS ===== */
function showResults(){
  var dd = d(), ll = l();
  var scores = {};
  BLOCKS.forEach(function(b){ scores[b]=0; });

  for(var i=0;i<21;i++){
    var origItem = state.shuffled[i].item;
    scores[origItem.block] += state.answers[i];
  }

  // Find dominant
  var maxScore = -1;
  BLOCKS.forEach(function(b){ if(scores[b]>maxScore) maxScore=scores[b]; });
  var dominant = BLOCKS.filter(function(b){ return scores[b]===maxScore; });

  var html = '';

  // Dominant phase section
  html += '<div class="section-title">'+ll.dominantPhase+'</div>';

  if(dominant.length > 1){
    html += '<div class="transition-note">';
    if(state.lang==='en') html += 'You\u2019re in transition between these phases \u2014 that\u2019s normal.';
    else html += 'Je zit in een overgang tussen deze fases \u2014 dat is normaal.';
    html += '</div>';
  }

  dominant.forEach(function(b){
    var r = dd.results[b];
    html += '<div class="result-phase">';
    html += '<div class="phase-name">\u2605 '+r.phase+'</div>';
    html += '<div class="tagline">\u201c'+r.tagline+'\u201d</div>';
    html += '<div class="desc">'+r.desc+'</div>';
    html += '<div class="help"><strong>'+(state.lang==='en'?'Tip':'Tip')+':</strong> '+r.help+'</div>';
    html += '</div>';
  });

  // Bar chart
  html += '<div class="section-title" style="margin-top:32px">'+ll.allScores+'</div>';
  html += '<div class="chart">';
  BLOCKS.forEach(function(b){
    var r = dd.results[b];
    var pct = (scores[b]/6)*100;
    var isDom = dominant.indexOf(b)>=0;
    html += '<div class="chart-row">';
    html += '<div class="chart-label">'+(isDom?'<span class="star">\u2605</span> ':'')+r.phase+'</div>';
    html += '<div class="chart-bar-wrap"><div class="chart-bar'+(isDom?' dominant':'')+'" style="width:'+pct+'%"></div></div>';
    html += '<div class="chart-score">'+scores[b]+'/6</div>';
    html += '</div>';
  });
  html += '</div>';

  // Bonus
  html += '<div class="section-title" style="margin-top:32px">'+ll.bonusResult+'</div>';
  var bInterp;
  if(state.bonusA > state.bonusB) bInterp = dd.bonusInterpretations.aHigher;
  else if(state.bonusB > state.bonusA) bInterp = dd.bonusInterpretations.bHigher;
  else bInterp = dd.bonusInterpretations.equal;
  html += '<div class="bonus-result">'+bInterp+'</div>';

  // Team spread
  if(state.mode==='team'){
    html += '<div class="spread-section">';
    html += '<div class="section-title" style="margin-top:32px">'+ll.spreadTitle+'</div>';
    html += '<p class="interp-notes" style="margin-bottom:16px">'+ll.teamSpreadIntro+'</p>';
    var sLabels = dd.spreadLabels;
    BLOCKS.forEach(function(b){
      var r = dd.results[b];
      html += '<div class="spread-row" data-spread-block="'+b+'">';
      html += '<div class="spread-phase-label">'+r.phase+'</div>';
      html += '<div class="spread-options">';
      for(var si=0;si<3;si++){
        var sel = (state.spread[b]===si)?'selected':'';
        html += '<button class="spread-opt '+sel+'" data-block="'+b+'" data-val="'+si+'">'+sLabels[si]+'</button>';
      }
      html += '</div></div>';
    });
    html += '</div>';
  }

  // Interpretation notes
  html += '<div class="section-title" style="margin-top:32px">'+ll.interpretationTitle+'</div>';
  html += '<p class="interp-notes">'+dd.interpretationNotes+'</p>';

  // Start over
  html += '<button class="btn-primary" id="btn-start-over" style="margin-top:32px">'+ll.startOver+'</button>';

  $('results-card').innerHTML = html;

  // Bind start over
  $('btn-start-over').addEventListener('click', function(){
    state.answers = new Array(21).fill(-1);
    state.currentQ = 0;
    state.bonusA = -1;
    state.bonusB = -1;
    state.spread = {};
    updateStartScreen();
    showScreen('screen-start');
  });

  // Bind spread buttons
  if(state.mode==='team'){
    document.querySelectorAll('.spread-opt').forEach(function(btn){
      btn.addEventListener('click', function(){
        var b = this.dataset.block;
        var v = parseInt(this.dataset.val);
        state.spread[b] = v;
        var row = this.closest('.spread-row');
        row.querySelectorAll('.spread-opt').forEach(function(o){
          o.classList.toggle('selected', parseInt(o.dataset.val)===v);
        });
      });
    });
  }

  // Animate bars
  setTimeout(function(){
    document.querySelectorAll('.chart-bar').forEach(function(bar){
      bar.style.width = bar.style.width;
    });
  },50);
}

/* ===== KEYBOARD ===== */
document.addEventListener('keydown', function(e){
  // Question screen
  if($('screen-question').classList.contains('active')){
    if(e.key==='1'||e.key==='2'||e.key==='3'){
      e.preventDefault();
      selectAnswer(parseInt(e.key)-1);
    }
    if(e.key==='Backspace' && state.currentQ>0){
      e.preventDefault();
      state.currentQ--;
      showQuestion();
    }
  }
});

/* ===== INIT ===== */
updateStartScreen();

})();
</script>
</body>
</html>
